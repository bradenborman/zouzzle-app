name: zouzzle
description: A daily sports guessing game for University of Missouri football and basketball players.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local persistence
  shared_preferences: ^2.3.5

  # Code generation — runtime annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.4

  # Property-based testing
  glados: ^1.1.7

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
